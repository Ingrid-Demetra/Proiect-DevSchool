<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Frontend for API</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a286b 0%, #04b8ef 100%);
        min-height: 100vh;
        padding: 20px;
        color: #333;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        color: white;
        margin-bottom: 10px;
        font-size: 2.5em;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        font-weight: 300;
      }

      .subtitle {
        text-align: center;
        color: rgba(255, 255, 255, 0.9);
        font-size: 1.1em;
        margin-bottom: 40px;
        font-weight: 300;
        letter-spacing: 2px;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
      }

      section {
        background: white;
        margin-bottom: 30px;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      section:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      }

      h2 {
        color: #4a5568;
        margin-bottom: 20px;
        font-size: 1.8em;
        border-bottom: 3px solid #667eea;
        padding-bottom: 10px;
        display: flex;
        align-items: center;
      }

      h2:before {
        content: "📋";
        margin-right: 10px;
      }

      h3 {
        color: #2d3748;
        margin: 25px 0 15px;
        font-size: 1.3em;
        font-weight: 600;
      }

      .load-btn {
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 500;
        margin-bottom: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      }

      .load-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
      }

      ul {
        list-style-type: none;
        margin-bottom: 25px;
      }

      li {
        background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
        margin: 8px 0;
        padding: 15px 20px;
        border-radius: 10px;
        border-left: 4px solid #667eea;
        transition: all 0.3s ease;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      li:hover {
        transform: translateX(5px);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .item-content {
        flex-grow: 1;
      }

      .item-actions {
        display: flex;
        gap: 8px;
      }

      .edit-btn,
      .delete-btn {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .edit-btn {
        background: #3182ce;
        color: white;
      }

      .edit-btn:hover {
        background: #2c5282;
        transform: translateY(-1px);
      }

      .delete-btn {
        background: #e53e3e;
        color: white;
      }

      .delete-btn:hover {
        background: #c53030;
        transform: translateY(-1px);
      }

      .update-form {
        display: none;
        background: #f8f9fa;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        margin-top: 15px;
      }

      .update-form.show {
        display: block;
      }

      .cancel-btn {
        background: #718096;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        margin-left: 10px;
        transition: all 0.3s ease;
      }

      .cancel-btn:hover {
        background: #4a5568;
      }

      form {
        background: #f8f9fa;
        padding: 25px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #4a5568;
        font-weight: 500;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 16px;
        transition: all 0.3s ease;
        background: white;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      input:required {
        border-color: #ed8936;
      }

      input:required:focus {
        border-color: #ed8936;
        box-shadow: 0 0 0 3px rgba(237, 137, 54, 0.1);
      }

      .submit-btn {
        background: linear-gradient(45deg, #48bb78, #38a169);
        color: white;
        border: none;
        padding: 14px 30px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        width: 100%;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(72, 187, 120, 0.6);
      }

      .submit-btn:active {
        transform: translateY(0);
      }

      @media (max-width: 768px) {
        body {
          padding: 10px;
        }

        section {
          padding: 20px;
        }

        h1 {
          font-size: 2em;
        }

        h2 {
          font-size: 1.5em;
        }
      }

      .hero-image {
        text-align: center;
        margin-bottom: 40px;
      }

      .hero-image img {
        max-width: 100%;
        height: auto;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
      }

      .hero-image img:hover {
        transform: scale(1.02);
      }
    </style>
  </head>

      <section id="identifiers">
        <h2>Identifiers Management</h2>
        <button class="load-btn" onclick="loadIdentifiers()">
          📥 Load All Identifiers
        </button>
        <ul id="identifiersList"></ul>
        <form id="createIdentifierForm">
          <h3>➕ Create New Identifier</h3>
          <div class="form-group">
            <label for="identifier_name">Identifier Name:</label>
            <input
              type="text"
              id="identifier_name"
              name="identifier_name"
              required
            />
          </div>
          <div class="form-group">
            <label for="description">Description:</label>
            <input type="text" id="description" name="description" />
          </div>
          <div class="form-group">
            <label for="identifier_type">Identifier Type:</label>
            <input type="text" id="identifier_type" name="identifier_type" />
          </div>
          <button type="submit" class="submit-btn">Create Identifier</button>
        </form>
      </section>

      <section id="countries">
        <h2>Countries Management</h2>
        <button class="load-btn" onclick="loadCountries()">
          📥 Load All Countries
        </button>
        <ul id="countriesList"></ul>
        <form id="createCountryForm">
          <h3>➕ Create New Country</h3>
          <div class="form-group">
            <label for="country_name">Country Name:</label>
            <input type="text" id="country_name" name="country_name" required />
          </div>
          <div class="form-group">
            <label for="iso_code">ISO Code:</label>
            <input type="text" id="iso_code" name="iso_code" />
          </div>
          <div class="form-group">
            <label for="short_code">Short Code:</label>
            <input type="text" id="short_code" name="short_code" />
          </div>
          <button type="submit" class="submit-btn">Create Country</button>
        </form>
      </section>
    </div>

    <script>
      const API_BASE = "http://localhost:8000";

      async function loadIdentifiers() {
        try {
          const response = await fetch(`${API_BASE}/identifiers/`);
          const data = await response.json();
          const list = document.getElementById("identifiersList");
          list.innerHTML = "";
          data.forEach((item) => {
            const li = document.createElement("li");

            const content = document.createElement("div");
            content.className = "item-content";
            content.textContent = `Name: ${item.identifier_name}, Description: ${item.description || "N/A"}, Type: ${item.identifier_type || "N/A"}`;

            const actions = document.createElement("div");
            actions.className = "item-actions";

            const editBtn = document.createElement("button");
            editBtn.className = "edit-btn";
            editBtn.textContent = "Edit";
            editBtn.onclick = () =>
              toggleUpdateForm(item.identifier_name, "identifier");

            const deleteBtn = document.createElement("button");
            deleteBtn.className = "delete-btn";
            deleteBtn.textContent = "Delete";
            deleteBtn.onclick = () => deleteIdentifier(item.identifier_name);

            actions.appendChild(editBtn);
            actions.appendChild(deleteBtn);

            const updateForm = document.createElement("form");
            updateForm.className = "update-form";
            updateForm.id = `update-identifier-${item.identifier_name}`;
            updateForm.innerHTML = `
              <h4>Update Identifier: ${item.identifier_name}</h4>
              <div class="form-group">
                <label>Description:</label>
                <input type="text" name="description" value="${item.description || ""}" />
              </div>
              <div class="form-group">
                <label>Identifier Type:</label>
                <input type="text" name="identifier_type" value="${item.identifier_type || ""}" />
              </div>
              <button type="submit" class="submit-btn">Update</button>
              <button type="button" class="cancel-btn" onclick="toggleUpdateForm('${item.identifier_name}', 'identifier')">Cancel</button>
            `;

            updateForm.onsubmit = (e) =>
              updateIdentifier(e, item.identifier_name);

            li.appendChild(content);
            li.appendChild(actions);
            li.appendChild(updateForm);
            list.appendChild(li);
          });
        } catch (error) {
          alert("Error loading identifiers: " + error.message);
        }
      }

      async function loadCountries() {
        try {
          const response = await fetch(`${API_BASE}/countries/`);
          const data = await response.json();
          const list = document.getElementById("countriesList");
          list.innerHTML = "";
          data.forEach((item) => {
            const li = document.createElement("li");

            const content = document.createElement("div");
            content.className = "item-content";
            content.textContent = `Name: ${item.name}, ISO: ${item.iso_code || "N/A"}, Short: ${item.short_code || "N/A"}`;

            const actions = document.createElement("div");
            actions.className = "item-actions";

            const editBtn = document.createElement("button");
            editBtn.className = "edit-btn";
            editBtn.textContent = "Edit";
            editBtn.onclick = () => toggleUpdateForm(item.name, "country");

            const deleteBtn = document.createElement("button");
            deleteBtn.className = "delete-btn";
            deleteBtn.textContent = "Delete";
            deleteBtn.onclick = () => deleteCountry(item.name);

            actions.appendChild(editBtn);
            actions.appendChild(deleteBtn);

            const updateForm = document.createElement("form");
            updateForm.className = "update-form";
            updateForm.id = `update-country-${item.name}`;
            updateForm.innerHTML = `
              <h4>Update Country: ${item.name}</h4>
              <div class="form-group">
                <label>ISO Code:</label>
                <input type="text" name="iso_code" value="${item.iso_code || ""}" />
              </div>
              <div class="form-group">
                <label>Short Code:</label>
                <input type="text" name="short_code" value="${item.short_code || ""}" />
              </div>
              <button type="submit" class="submit-btn">Update</button>
              <button type="button" class="cancel-btn" onclick="toggleUpdateForm('${item.name}', 'country')">Cancel</button>
            `;

            updateForm.onsubmit = (e) => updateCountry(e, item.name);

            li.appendChild(content);
            li.appendChild(actions);
            li.appendChild(updateForm);
            list.appendChild(li);
          });
        } catch (error) {
          alert("Error loading countries: " + error.message);
        }
      }

      document
        .getElementById("createIdentifierForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const formData = new FormData(e.target);
          const data = {
            identifier_name: formData.get("identifier_name"),
            description: formData.get("description") || null,
            identifier_type: formData.get("identifier_type") || null,
          };
          try {
